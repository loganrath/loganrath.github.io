<!DOCTYPE html>
<html lang="en-US">
  {% include head.html %}
  <style>
    /* =====================================================
       home2 layout — modern redesign
       ===================================================== */
    :root {
      --h2-primary:       #005889;
      --h2-primary-dark:  #00416a;
      --h2-primary-light: #e8f4fd;
      --h2-accent:        #0e7490;
      --h2-text:          #111827;
      --h2-text-muted:    #6b7280;
      --h2-bg:            #f8fafc;
      --h2-surface:       #ffffff;
      --h2-border:        #e5e7eb;
      --h2-nav-h:         60px;
      --h2-font-sans:     'Noto Sans', sans-serif;
      --h2-font-display:  'Poppins', sans-serif;
    }

    body { background: var(--h2-bg); }

    /* ---- Sticky frosted-glass navbar ---- */
    .h2-navbar {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--h2-nav-h);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--h2-border);
    }
    .h2-navbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .h2-brand {
      font-family: var(--h2-font-display);
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--h2-primary);
      text-decoration: none;
      white-space: nowrap;
    }
    .h2-brand:hover { color: var(--h2-primary-dark); text-decoration: none; }
    .h2-nav-links {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 0.125rem;
      flex-wrap: wrap;
    }
    .h2-nav-links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--h2-text-muted);
      text-decoration: none;
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .h2-nav-links a:hover {
      color: var(--h2-primary);
      background: var(--h2-primary-light);
    }

    /* ---- Hero ---- */
    .h2-hero {
      background: linear-gradient(135deg, var(--h2-primary) 0%, var(--h2-accent) 100%);
      color: white;
      padding: 4rem 1.5rem 5rem;
      position: relative;
      overflow: hidden;
    }
    /* Decorative background circles */
    .h2-hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      pointer-events: none;
    }
    /* Curved bottom edge */
    .h2-hero::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--h2-bg);
      clip-path: ellipse(56% 100% at 50% 100%);
    }
    .h2-hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .h2-hero-name {
      font-family: var(--h2-font-display);
      font-size: clamp(2.25rem, 5vw, 3.5rem);
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: white;
    }
    .h2-hero-degree { opacity: 0.8; }
    .h2-hero-tagline {
      font-size: 1.125rem;
      opacity: 0.82;
      margin: 0 0 2rem;
      font-weight: 300;
      letter-spacing: 0.03em;
    }
    .h2-social {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
    }
    .h2-social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      font-size: 1.15rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, border-color 0.2s;
    }
    .h2-social a:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-3px);
      color: white;
      text-decoration: none;
    }
    .h2-social a:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.8);
      outline-offset: 2px;
    }

    /* ---- Main content ---- */
    .h2-main {
      padding: 2.5rem 1.5rem 5rem;
    }
    .h2-content {
      max-width: 1200px;
      margin: 0 auto;
      font-size: 1.0625rem;
    }
    .h2-content a:link,
    .h2-content a:visited { color: var(--h2-primary); }
    .h2-content a:hover   { color: var(--h2-primary-dark); text-decoration: underline; }

    /* ---- Responsive ---- */
    @media (max-width: 640px) {
      .h2-nav-links { display: none; }
      .h2-hero { padding: 2.5rem 1rem 4rem; }
    }

    /* ---- Print ---- */
    @media print {
      .h2-navbar, .h2-hero { display: none !important; }
      .h2-main { padding: 0; }
      body { background: white; }
    }
  </style>
  <body>

    <!-- Sticky frosted-glass navigation -->
    <nav class="h2-navbar d-print-none" aria-label="Site navigation">
      <div class="h2-navbar-inner">
        <a class="h2-brand" href="/">Logan Rath, PhD</a>
        <ul class="h2-nav-links" role="list">
          <li><a href="/about/">About</a></li>
          <li><a href="/teaching/">Teaching</a></li>
          <li><a href="/publications/">Publications</a></li>
          <li><a href="/research/">Research</a></li>
          <li><a href="/presentations/">Presentations</a></li>
        </ul>
      </div>
    </nav>

    <!-- Hero section -->
    <header class="h2-hero d-print-none">
      <div class="h2-hero-inner">
        <h1 class="h2-hero-name">Logan Rath, <span class="h2-hero-degree">PhD</span></h1>
        <p class="h2-hero-tagline">Librarian &bull; Researcher &bull; Educator</p>
        <div class="h2-social" aria-label="Social and professional links">
          <a href="mailto:logan@rath.phd" title="Email"><i class="fas fa-envelope" aria-hidden="true"></i><span class="visually-hidden">Email</span></a>
          <a href="/rath_cv_web.pdf" title="Curriculum Vitae"><i class="ai ai-cv-square" aria-hidden="true"></i><span class="visually-hidden">CV</span></a>
          <a href="https://www.brockport.edu/live/profiles/logan-rath" title="Brockport Profile"><i class="fas fa-university" aria-hidden="true"></i><span class="visually-hidden">Institution profile</span></a>
          <a href="https://scholar.google.com/citations?user=sfO-kFAAAAAJ&hl=en" title="Google Scholar"><i class="ai ai-google-scholar-square" aria-hidden="true"></i><span class="visually-hidden">Google Scholar</span></a>
          <a href="https://orcid.org/0000-0002-6221-4536" title="ORCID iD"><i class="fab fa-orcid" aria-hidden="true"></i><span class="visually-hidden">ORCID</span></a>
          <a href="https://github.com/loganrath" title="GitHub"><i class="fab fa-github" aria-hidden="true"></i><span class="visually-hidden">GitHub</span></a>
          <a href="https://linkedin.com/in/loganrath" title="LinkedIn"><i class="fab fa-linkedin" aria-hidden="true"></i><span class="visually-hidden">LinkedIn</span></a>
          <a rel="me" href="https://kind.social/@logan" title="Mastodon"><i class="fab fa-mastodon" aria-hidden="true"></i><span class="visually-hidden">Mastodon</span></a>
        </div>
      </div>
    </header>

    <!-- Page content from index.html -->
    <main class="h2-main">
      <div class="h2-content">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}

  </body>
</html>
