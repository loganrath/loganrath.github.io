layout: page
---
<div class="container">
	<div class="row">
    <div id="doiSearchBox" class="col-12 mb-4">
  		<div class="text-center">
  					<p>If you enter a DOI or PMID on this page, this tool will resolve the DOI and provide links to download or request the item.</p>
  		<input type="text" id="doiInput" placeholder="Enter DOI or PMID" class="w-75 h4" />
      <button class="btn btn-primary btn-lg mt-n2" onclick="lookupArticle()">Lookup Item</button>
  		</div>
  		</div>
  <h2 class="text-center mt-4">Results</h2>
  <div id="libkeyoutput" style="margin-top: 20px;"></div>
</div>
</div>
  <script>
    async function lookupArticle() {
      const input = document.getElementById("doiInput").value.trim();
      const outputDiv = document.getElementById("libkeyoutput");
      outputDiv.innerHTML += "";

      if (!input) {
        outputDiv.innerHTML = "<p style='color: red;'>Please enter a valid DOI or PMID.</p><hr />" + outputDiv.innerHTML;
        return;
      }

      const LIBKEY_API_KEY = "0a776d9c-1749-4b60-8c60-337784a0678a";
      const LIBRARY_ID = "3415";
      const UNIVERSITY_NAME = "Brockport";
      const ILLiad = "https://brockport.idm.oclc.org/login?url=https://brockport.illiad.oclc.org/illiad/illiad.dll/OpenURL?sid=Library%20DOI%20Resolver%20outside%20of%20ILLiad&"
      let endpoint = "";
      let identifier = "";

      // Detect if input is a DOI or PMID
      if (input.startsWith("https://doi.org/") || input.startsWith("http://doi.org/") || input.startsWith("doi")) {
        identifier = input.substring(input.indexOf("10."));
        endpoint = `https://api.thirdiron.com/public/v1/libraries/${LIBRARY_ID}/articles/doi/${encodeURIComponent(identifier)}`;
      } else if (input.startsWith("10.")) {
        identifier = input;
        endpoint = `https://api.thirdiron.com/public/v1/libraries/${LIBRARY_ID}/articles/doi/${encodeURIComponent(identifier)}`;
      } else if (!isNaN(input)) {
        identifier = input;
        endpoint = `https://api.thirdiron.com/public/v1/libraries/${LIBRARY_ID}/articles/pmid/${encodeURIComponent(identifier)}`;
      } else {
        outputDiv.innerHTML = "<p style='color: red;'>Invalid input. Please enter a valid DOI or PMID.</p><hr />" + outputDiv.innerHTML;
        return;
      }

      try {
        const response = await fetch(endpoint, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${LIBKEY_API_KEY}`,
            "Content-Type": "application/json"
          }
        });

        if (response.status === 404) {
          outputDiv.innerHTML = "<p style='color: red;'>Error 404: Article not found. Please check the DOI/PMID and try again.</p><hr />" + outputDiv.innerHTML;
          return;
        }

        if (!response.ok) {
          throw new Error(`Error ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        // Extract data from the response
        const article = data.data || {};
        const linkResolverOpenUrl = article.linkResolverOpenUrl || "";
        const openUrlParams = new URLSearchParams(linkResolverOpenUrl.split("?")[1]);

        // Extract metadata from OpenURL
        const title = openUrlParams.get("atitle") || "Title not available";
        const authors = openUrlParams.get("aulast") || "Authors not available";
        const journal = openUrlParams.get("title") || "Journal not available";
        const volume = openUrlParams.get("volume") || null;
        const issue = openUrlParams.get("issue") || null;
        const date = openUrlParams.get("date") || "n.d.";
        const startPage = openUrlParams.get("spage") || null;
        const endPage = openUrlParams.get("epage") || null;
        const doi = openUrlParams.get("rft_id")?.includes("doi") ? openUrlParams.get("rft_id").split("/").pop() : null;
        const bestLink = article.bestIntegratorLink?.bestLink || null;

        // Format authors for Chicago-style citation
        function formatAuthors(authors) {
          if (!authors || authors === "Authors not available") return "Authors not available";

          const authorList = authors.split(";").map((author) => author.trim());
          if (authorList.length === 1) {
            return authorList[0];
          } else if (authorList.length === 2) {
            return `${authorList[0]} and ${authorList[1]}`;
          } else {
            return `${authorList[0]}, et al.`;
          }
        }

        // Generate Chicago-style citation
        const chicagoCitation = `${formatAuthors(authors)}. "${title}." <i>${journal}</i> ${volume ? volume : ""}${issue ? `, no. ${issue}` : ""} (${date}): ${
          startPage && endPage ? `${startPage}-${endPage}` : "n.p."
        }. ${doi ? `<a href="https://doi.org/${doi}" target="_blank">${doi}</a>` : ""}`;

        // Display the citation and the "Find Through Brockport" button
        outputDiv.innerHTML = `
          <p><strong>Article Found:</strong> ${chicagoCitation}</p>
          ${
            bestLink
              ? `<a class="btn btn-primary" href="${bestLink}" target="_blank">Locate through Brockport</a>`
              : "<p style='color: red;'>No link available to access the article.</p>"
          }
          <button class="btn btn-primary" target="_blank" href="${ILLiad}${linkResolverOpenUrl}">Request via ILLiad</button>
          <hr />
        ` + outputDiv.innerHTML;
      } catch (error) {
        console.error("An error occurred:", error);
        outputDiv.innerHTML = `<p style='color: red;'>An error occurred: ${error.message}</p>` + outputDiv.innerHTML;
      }
    }

    // Helper function to format authors for Chicago-style citation
    function formatAuthors(authors) {
      if (!authors || authors === "Authors not available") return "Authors not available";

      const authorList = authors.split(";").map((author) => author.trim());
      if (authorList.length === 1) {
        const [lastName, firstName] = authorList[0].split(", ");
        return `${lastName}, ${firstName}`;
      } else if (authorList.length === 2 || authorList.length === 3) {
        return authorList
          .map((author, index) => {
            const [lastName, firstName] = author.split(", ");
            if (index === 0) return `${lastName}, ${firstName}`;
            return `${firstName} ${lastName}`;
          })
          .join(", ")
          .replace(/, ([^,]*)$/, " and $1");
      } else {
        const [firstLastName, firstFirstName] = authorList[0].split(", ");
        return `${firstLastName}, ${firstFirstName}, et al.`;
      }
    }
  </script>
